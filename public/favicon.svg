<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF70"/>
      <stop offset="50%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#B8944A"/>
    </linearGradient>
  </defs>

  <!-- Background — rounded square, dark -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle inner border for depth -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- S lettermark — geometric, optically centred -->
  <text
    x="16"
    y="23"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="700"
    font-style="italic"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="-0.5"
  >S</text>
</svg>
